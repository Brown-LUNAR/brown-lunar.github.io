{% extends "base.html" %}
{% block content %}
<h1>Lab Members</h1>
<div class="members">
    {% for member in members %}
    <div class="member">
        {% if member.picture.startswith('http') %}
        <img src="{{ member.picture }}" alt="{{ member.name }}" class="member-pic">
        {% else %}
        <img src="/{{ member.picture }}" alt="{{ member.name }}" class="member-pic">
        {% endif %}
        <h2>{{ member.name }}</h2>
        <p><strong>Role:</strong> {{ member.role }}</p>
        <p><a href="{{ member.website }}">Website</a></p>
        <p><strong>Contact:</strong> {{ member.contact.email }} </p>
    </div>
    {% endfor %}
</div>
{% endblock %}
